<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Explore Palawan's top tourist destinations — beaches, islands, historical sites, mountains, and adventures.">
    <title>Tourist Destinations — Discover Palawan</title>
    <link rel="icon" type="image/png" href="images/logo.png">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="destinations">

<!-- Scroll Progress -->
<div id="scroll-progress"></div>

<!-- Loading Screen -->
<div id="page-loader">
    <div class="loader-logo"></div>
    <div class="loader-text">Loading Palawan...</div>
</div>

<!-- Navbar -->
<div id="navbar-placeholder"></div>

<div class="page-hero">
    <img src="images/el_nido.jpg" alt="Destinations">
    <div class="page-hero-content">
        <h1>Tourist Destinations</h1>
        <p>Discover Palawan's most extraordinary places</p>
        <div class="page-breadcrumb"><a href="index.html">Home</a><span>›</span><span>Destinations</span></div>
    </div>
</div>
<div class="pattern-banner"></div>

<section class="py-5">
    <div class="container py-3">
        <h2 class="section-title slide-up">Explore Palawan</h2>
        <p class="section-intro slide-up delay-1">Search, filter, and discover the perfect destination for your adventure.</p>

        <!-- SEARCH -->
        <div class="search-wrap slide-up delay-2">
            <i class="bi bi-search search-icon"></i>
            <input type="text" id="dest-search" placeholder="Search by name, city or category...">
        </div>

        <!-- FILTER BUTTONS -->
        <div class="filter-bar slide-up delay-3">
            <button class="filter-btn active" data-filter="All">All</button>
            <button class="filter-btn" data-filter="Beach">Beach</button>
            <button class="filter-btn" data-filter="Island">Island</button>
            <button class="filter-btn" data-filter="Mountain">Mountain</button>
            <button class="filter-btn" data-filter="Historical Site">Historical Site</button>
            <button class="filter-btn" data-filter="Adventure">Adventure</button>
            <button class="filter-btn" data-filter="Waterfall">Waterfall</button>
        </div>

        <p class="result-count" id="result-count">Loading destinations...</p>

        <!-- DYNAMIC DESTINATION GRID -->
        <div class="row" id="destinations-grid">
            <!-- Populated by script.js -->
        </div>
    </div>
</section>

<!-- DESTINATION DETAIL MODAL -->
<div class="modal fade" id="dest-modal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content">
            <img id="modal-img" src="" alt="" class="modal-img">
            <div class="modal-body">
                <div class="d-flex justify-content-end mb-2">
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-location-row">
                    <span class="modal-location-badge"><i class="bi bi-geo-alt-fill" style="color:var(--coral);"></i> <span id="modal-location"></span></span>
                    <span class="modal-cat-badge" id="modal-category"></span>
                </div>
                <h2 class="modal-dest-title" id="modal-title"></h2>
                <p id="modal-desc" style="color:var(--muted);line-height:1.85;font-size:0.95rem;"></p>

                <div class="modal-section-label">Activities</div>
                <div id="modal-activities"></div>

                <div class="info-row">
                    <div class="info-row-item">
                        <div class="label"><i class="bi bi-calendar3"></i> Best Time to Visit</div>
                        <div class="value" id="modal-best-time"></div>
                    </div>
                    <div class="info-row-item">
                        <div class="label"><i class="bi bi-ticket"></i> Entrance Fee</div>
                        <div class="value" id="modal-fee"></div>
                    </div>
                    <div class="info-row-item">
                        <div class="label"><i class="bi bi-clock"></i> Opening Hours</div>
                        <div class="value" id="modal-hours"></div>
                    </div>
                    <div class="info-row-item">
                        <div class="label"><i class="bi bi-lightbulb"></i> Travel Tips</div>
                        <div class="value" id="modal-tips"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Scroll to Top -->
<button id="scroll-top" title="Back to top"><i class="bi bi-arrow-up"></i></button>

<!-- Footer -->
<div id="footer-placeholder"></div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- Data -->
<script src="js/data.js"></script>
<!-- Components -->
<script src="js/components.js"></script>
<!-- Main Script -->
<script src="js/script.js"></script>
</body>
</html>
