<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Browse stunning photos of Palawan's beaches, islands, nature, and culture.">
    <title>Photo Gallery — Discover Palawan</title>
    <link rel="icon" type="image/png" href="images/logo.png">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="gallery">

<!-- Scroll Progress -->
<div id="scroll-progress"></div>

<!-- Loading Screen -->
<div id="page-loader">
    <div class="loader-logo"></div>
    <div class="loader-text">Loading Palawan...</div>
</div>

<!-- Navbar -->
<div id="navbar-placeholder"></div>

<div class="page-hero">
    <img src="images/el_nido.jpg" alt="Gallery">
    <div class="page-hero-content">
        <h1>Photo Gallery</h1>
        <p>A visual journey through Palawan's wonders</p>
        <div class="page-breadcrumb"><a href="index.html">Home</a><span>›</span><span>Gallery</span></div>
    </div>
</div>
<div class="pattern-banner"></div>

<section class="py-5">
    <div class="container-fluid px-4">
        <h2 class="section-title slide-up">Palawan in Pictures</h2>
        <p class="section-intro slide-up delay-1">Click any image to view it in full screen. Use arrow keys to navigate.</p>

        <div class="gallery-grid">
            <div class="gallery-item fade-in" data-caption="Big Lagoon, El Nido"><img src="images/el_nido.jpg" alt="Big Lagoon El Nido" loading="lazy"></div>
            <div class="gallery-item fade-in delay-1" data-caption="Kayangan Lake, Coron"><img src="images/coron.avif" alt="Kayangan Lake" loading="lazy"></div>
            <div class="gallery-item fade-in delay-2" data-caption="Puerto Princesa Underground River"><img src="images/puerto_princesa.webp" alt="Underground River" loading="lazy"></div>
            <div class="gallery-item fade-in" data-caption="Long Beach, San Vicente"><img src="images/san_vicente.jpg" alt="Long Beach" loading="lazy"></div>
            <div class="gallery-item fade-in delay-1" data-caption="Fort Santa Isabel, Taytay"><img src="images/taytay.webp" alt="Fort Santa Isabel" loading="lazy"></div>
            <div class="gallery-item fade-in delay-2" data-caption="Port Barton Beach"><img src="images/port_barton.jpg" alt="Port Barton" loading="lazy"></div>
            <div class="gallery-item fade-in" data-caption="Island Hopping, El Nido"><img src="images/island_hopping.jpg" alt="Island Hopping" loading="lazy"></div>
            <div class="gallery-item fade-in delay-1" data-caption="World-Class Diving, Coron"><img src="images/diving.webp" alt="Diving" loading="lazy"></div>
            <div class="gallery-item fade-in delay-2" data-caption="Kayaking through sea caves"><img src="images/kayaking.webp" alt="Kayaking" loading="lazy"></div>
            <div class="gallery-item fade-in" data-caption="Hiking through Palawan's jungle"><img src="images/hiking.webp" alt="Hiking" loading="lazy"></div>
            <div class="gallery-item fade-in delay-1" data-caption="Palawan's pristine islands"><img src="images/island.jpg" alt="Islands" loading="lazy"></div>
            <div class="gallery-item fade-in delay-2" data-caption="Palawan's living rainforest"><img src="images/rainforest.jpg" alt="Rainforest" loading="lazy"></div>
            <div class="gallery-item fade-in" data-caption="Indigenous culture, Palawan"><img src="images/culture.jpg" alt="Culture" loading="lazy"></div>
            <div class="gallery-item fade-in delay-1" data-caption="Scuba diving El Nido reefs"><img src="images/coron_reef.avif" alt="Scuba Diving" loading="lazy"></div>
            <div class="gallery-item fade-in delay-2" data-caption="Palawan's hero landscape"><img src="images/header.jpg" alt="Palawan landscape" loading="lazy"></div>
            <div class="gallery-item fade-in" data-caption="Cultural tour in Palawan"><img src="images/cultural_tour.jpg" alt="Cultural Tour" loading="lazy"></div>
            <div class="gallery-item fade-in delay-1" data-caption="El Nido sunset vista"><img src="images/kayangan.jpg" alt="El Nido Sunset" loading="lazy"></div>
            <div class="gallery-item fade-in delay-2" data-caption="Coron bay panorama"><img src="images/tultul.jpg" alt="Coron Bay" loading="lazy"></div>
            <div class="gallery-item fade-in" data-caption="San Vicente coastline"><img src="images/portrait_palawan.avif" alt="San Vicente Coast" loading="lazy"></div>
            <div class="gallery-item fade-in delay-1" data-caption="Taytay historic fort walls"><img src="images/taytay.webp" alt="Taytay Fort" loading="lazy"></div>
            <div class="gallery-item fade-in delay-2" data-caption="Port Barton islands"><img src="images/wreck.png" alt="Port Barton Islands" loading="lazy"></div>
            <div class="gallery-item fade-in" data-caption="Underwater El Nido"><img src="images/crocodile.webp" alt="Underwater El Nido" loading="lazy"></div>
            <div class="gallery-item fade-in delay-1" data-caption="Banca boats in El Nido Bay"><img src="images/white_beach.jpg" alt="Banca Boats" loading="lazy"></div>
            <div class="gallery-item fade-in delay-2" data-caption="Mangrove kayaking tour"><img src="images/snorkeling.avif" alt="Mangrove Kayaking" loading="lazy"></div>
            <div class="gallery-item fade-in" data-caption="Trail to the summit"><img src="images/palawan_indigenous.webp" alt="Summit Trail" loading="lazy"></div>
            <div class="gallery-item fade-in delay-1" data-caption="Palawan coral reef"><img src="images/palawan_aerial.jpg" alt="Coral Reef" loading="lazy"></div>
            <div class="gallery-item fade-in delay-2" data-caption="Palawan wildlife"><img src="images/wild_life.avif" alt="Wildlife" loading="lazy"></div>
            <div class="gallery-item fade-in" data-caption="Festival in Puerto Princesa"><img src="images/seafood.webp" alt="Festival" loading="lazy"></div>
            <div class="gallery-item fade-in delay-1" data-caption="Pristine Palawan island"><img src="images/baragatan.webp" alt="Pristine Island" loading="lazy"></div>
            <div class="gallery-item fade-in delay-2" data-caption="Palawan — Every Island, An Adventure"><img src="images/kulambo.jpg" alt="Palawan Panorama" loading="lazy"></div>
        </div>
    </div>
</section>

<!-- LIGHTBOX -->
<div id="gallery-lightbox">
    <div class="lightbox-inner">
        <button id="lightbox-close" title="Close"><i class="bi bi-x-lg"></i></button>
        <img id="lightbox-img" src="" alt="">
        <p id="lightbox-caption"></p>
        <button class="lightbox-btn" id="lightbox-prev"><i class="bi bi-chevron-left"></i></button>
        <button class="lightbox-btn" id="lightbox-next"><i class="bi bi-chevron-right"></i></button>
    </div>
</div>

<!-- Scroll to Top -->
<button id="scroll-top" title="Back to top"><i class="bi bi-arrow-up"></i></button>

<!-- Footer -->
<div id="footer-placeholder"></div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- Data -->
<script src="js/data.js"></script>
<!-- Components -->
<script src="js/components.js"></script>
<!-- Main Script -->
<script src="js/script.js"></script>
</body>
</html>
